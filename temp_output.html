</style>
<script>
    (() => {
        const exposeName = 'model';
        const autoExposeModel = {};
        if (autoExposeModel && typeof autoExposeModel === 'object') {
            const currentExpose = window[exposeName];
            if (currentExpose && typeof currentExpose === 'object') {
                window[exposeName] = { ...autoExposeModel, ...currentExpose };
            } else {
                window[exposeName] = autoExposeModel;
            }
        }

        const hidePageLoading = () => {
            const el = document.getElementById('ele-page-loading');
            if (!el) return;
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
            setTimeout(() => el.remove(), 320);
        };

        const mountApp = (retry = 0) => {
            if (!window.EleAppBuilder) {
                if (retry < 40) {
                    setTimeout(() => mountApp(retry + 1), 25);
                    return;
                }
                console.error('EleAppBuilder is not available. Ensure /_content/App.EleUI/eleui/eleui.js is loaded.');
                hidePageLoading();
                return;
            }

            try {
                new window.EleAppBuilder().mount('body', {
                    useLocale: true,
                    registerIcons: true,
                    exposeName: exposeName
                });
            } finally {
                hidePageLoading();
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => mountApp(), { once: true });
        } else {
            mountApp();
        }
    })();
</script>
